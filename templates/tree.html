<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>แผนผังกฎหมายภาษีสรรพากร</title>
<style>
:root {
  --blue-900: #0F2A5C;
  --blue-800: #1A3A7A;
  --blue-700: #1D4ED8;
  --blue-600: #2563EB;
  --blue-500: #3B82F6;
  --blue-100: #DBEAFE;
  --blue-50:  #EFF6FF;
  --teal-700: #0F766E;
  --teal-100: #CCFBF1;
  --amber-700: #B45309;
  --amber-100: #FEF3C7;
  --chat-700: #D97706;
  --chat-600: #B45309;
  --chat-100: #FEF3C7;
  --chat-50:  #FFFBEB;
  --purple-700: #7E22CE;
  --purple-100: #F3E8FF;
  --rose-700: #9F1239;
  --rose-100: #FFE4E6;
  --red-700:  #B91C1C;
  --red-600:  #DC2626;
  --red-50:   #FEF2F2;
  --gray-50:  #F8FAFC;
  --gray-100: #F1F5F9;
  --gray-200: #E2E8F0;
  --gray-300: #CBD5E1;
  --gray-400: #94A3B8;
  --gray-500: #64748B;
  --gray-700: #334155;
  --gray-900: #0F172A;
  --white:    #FFFFFF;
  --shadow:   0 4px 12px rgba(0,0,0,.08);
  --shadow-lg:0 8px 28px rgba(0,0,0,.16);
  --radius:   8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', 'Noto Sans Thai', Arial, sans-serif;
  background: var(--gray-50); color: var(--gray-900);
  height: 100vh; overflow: hidden; display: flex; flex-direction: column;
  font-size: 14px;
}

/* ── topbar ── */
.topbar {
  background: var(--blue-900); color: #fff;
  display: flex; align-items: center; gap: 14px;
  padding: 0 18px; height: 52px; flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(0,0,0,.25); z-index: 50;
}
.topbar h1 { font-size: .98rem; font-weight: 700; white-space: nowrap; }
.topbar a.back { color: #BFDBFE; text-decoration: none; font-size: .8rem; padding: 5px 10px; border: 1px solid rgba(255,255,255,.25); border-radius: 6px; white-space: nowrap; }
.topbar a.back:hover { background: rgba(255,255,255,.08); }
.topbar .mobile-toggle { display: none; background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.25); color: #fff; border-radius: 6px; padding: 6px 10px; font-size: .8rem; cursor: pointer; }

/* ── layout ── */
.layout { display: flex; flex: 1; overflow: hidden; position: relative; }
.backdrop { display: none; position: fixed; inset: 0; background: rgba(15,23,42,.45); z-index: 40; }
.backdrop.show { display: block; }

/* ── left: มาตรา list ── */
.sidebar { width: 260px; background: var(--white); border-right: 1px solid var(--gray-200); display: flex; flex-direction: column; flex-shrink: 0; }
.sidebar-header { padding: 10px 12px; border-bottom: 1px solid var(--gray-200); display: flex; align-items: center; gap: 8px; }
.sidebar-header input { flex: 1; width: 100%; background: var(--gray-50); border: 1px solid var(--gray-200); border-radius: 6px; padding: 7px 10px; color: var(--gray-900); font-size: .82rem; outline: none; }
.sidebar-header input:focus { border-color: var(--blue-500); }
.sidebar-close { display: none; background: none; border: none; font-size: 1rem; color: var(--gray-500); cursor: pointer; padding: 4px; }
.section-count { font-size: .72rem; color: var(--gray-500); padding: 6px 12px 4px; }
.sec-list { overflow-y: auto; flex: 1; }
.sec-item { padding: 6px 12px 6px 16px; cursor: pointer; border-left: 3px solid transparent; font-size: .82rem; line-height: 1.35; }
.sec-item:hover { background: var(--gray-50); }
.sec-item.active { background: var(--blue-50); border-left-color: var(--blue-600); }
.sec-item .sec-ref { color: var(--blue-700); font-weight: 700; font-size: .76rem; }
.sec-item .sec-title { color: var(--gray-500); font-size: .74rem; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.laksana-hdr { padding: 9px 10px 4px; font-size: .7rem; font-weight: 700; color: var(--blue-700); letter-spacing: .04em; text-transform: uppercase; border-top: 1px solid var(--gray-200); background: var(--white); cursor: pointer; user-select: none; }
.laksana-hdr:first-child { border-top: none; }
.laksana-hdr:hover { background: var(--gray-50); }
.chapter-hdr { padding: 6px 10px 6px 12px; font-size: .76rem; font-weight: 600; color: var(--gray-700); background: var(--gray-50); cursor: pointer; display: flex; align-items: center; gap: 5px; user-select: none; border-top: 1px solid var(--gray-100); }
.chapter-hdr:hover { background: var(--gray-100); }
.chapter-hdr .ch-arrow { color: var(--gray-400); font-size: .65rem; transition: transform .2s; flex-shrink: 0; }
.chapter-hdr.collapsed .ch-arrow { transform: rotate(-90deg); }
.chapter-body.collapsed { display: none; }
.part-hdr { padding: 4px 10px 4px 20px; font-size: .7rem; color: var(--gray-400); background: var(--white); font-style: italic; }

/* ── center: outline tree ── */
.center { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; min-width: 0; }
.center-header { padding: 12px 18px; background: var(--white); border-bottom: 1px solid var(--gray-200); flex-shrink: 0; }
.center-header h2 { font-size: 1rem; color: var(--gray-900); font-weight: 700; }
.center-header p { font-size: .78rem; color: var(--gray-500); margin-top: 3px; }
.tree-controls { display: flex; align-items: center; gap: 12px; margin-top: 10px; flex-wrap: wrap; }
.tree-controls input[type=text] { flex: 1; min-width: 160px; border: 1px solid var(--gray-200); border-radius: 6px; padding: 7px 10px; font-size: .82rem; outline: none; background: var(--gray-50); }
.tree-controls input[type=text]:focus { border-color: var(--blue-500); background: var(--white); }
.tree-controls label { display: flex; align-items: center; gap: 5px; font-size: .78rem; color: var(--gray-700); white-space: nowrap; cursor: pointer; }

.empty-state { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--gray-400); gap: 10px; }
.empty-state .icon { font-size: 3rem; opacity: .5; }

.outline { flex: 1; overflow-y: auto; padding: 14px 18px 40px; }
.outline-empty { color: var(--gray-500); font-size: .85rem; padding: 30px 0; text-align: center; }
.outline-no-match { display: none; color: var(--gray-500); font-size: .85rem; padding: 20px 0; text-align: center; }

.doc-group { background: var(--white); border: 1px solid var(--gray-200); border-left-width: 4px; border-radius: var(--radius); margin-bottom: 10px; overflow: hidden; }
.group-hdr { display: flex; align-items: center; gap: 8px; padding: 9px 12px; cursor: pointer; user-select: none; background: var(--gray-50); }
.group-hdr:hover { background: var(--gray-100); }
.grp-arrow { font-size: .65rem; color: var(--gray-400); transition: transform .15s; flex-shrink: 0; width: 10px; }
.group-hdr.collapsed .grp-arrow { transform: rotate(-90deg); }
.grp-icon { flex-shrink: 0; }
.grp-label { font-weight: 700; font-size: .85rem; color: var(--gray-900); }
.grp-count { margin-left: auto; font-size: .72rem; color: var(--gray-500); background: var(--gray-200); border-radius: 999px; padding: 1px 8px; flex-shrink: 0; }

.group-body { padding: 4px 8px 8px 22px; position: relative; }
.group-body.collapsed { display: none; }
.group-body::before { content: ''; position: absolute; left: 12px; top: 0; bottom: 30px; width: 1px; background: var(--gray-200); }

.doc-item { position: relative; padding: 7px 10px 7px 16px; margin: 2px 0; border-radius: 6px; cursor: pointer; font-size: .8rem; line-height: 1.4; }
.doc-item::before { content: ''; position: absolute; left: -10px; top: 15px; width: 8px; height: 1px; background: var(--gray-200); }
.doc-item:hover { background: var(--blue-50); }
.doc-item.extra { display: none; }
.group-body.show-all .doc-item.extra { display: block; }
.doc-main { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.doc-ref { font-weight: 600; color: var(--gray-900); }
.doc-title { color: var(--gray-500); font-size: .76rem; margin-top: 1px; }
.doc-year { color: var(--gray-400); font-size: .7rem; margin-top: 1px; }
.doc-item.is-repealed .doc-ref, .doc-item.is-repealed .doc-title { color: var(--red-600); text-decoration: line-through; text-decoration-color: rgba(220,38,38,.5); }

.badge { display: inline-flex; align-items: center; font-size: .68rem; font-weight: 700; border-radius: 999px; padding: 1px 7px; }
.badge-repealed { background: var(--red-50); color: var(--red-700); border: 1px solid #FCA5A5; text-decoration: none; }
.badge-amended { background: var(--chat-50); color: var(--chat-700); border: 1px solid #FCD34D; }

.show-all-btn { display: inline-block; margin: 6px 0 2px 16px; background: none; border: 1px dashed var(--gray-300); color: var(--blue-700); font-size: .74rem; font-weight: 600; padding: 5px 12px; border-radius: 6px; cursor: pointer; font-family: inherit; }
.show-all-btn:hover { background: var(--blue-50); border-color: var(--blue-300, var(--blue-500)); }

.outline.hide-repealed .doc-item.is-repealed { display: none !important; }
.outline.filtering .group-body { display: block !important; }
.outline.filtering .doc-item.extra { display: block !important; }
.outline.filtering .group-hdr .grp-arrow { opacity: .3; }

/* ── right: detail ── */
.detail { width: 340px; background: var(--white); border-left: 1px solid var(--gray-200); display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; }
.detail-close { display: none; }
.detail-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; color: var(--gray-400); gap: 8px; font-size: .85rem; text-align: center; padding: 0 20px; }
.detail-body { padding: 16px; overflow-y: auto; flex: 1; }
.detail-tag { display: inline-block; background: var(--blue-50); color: var(--blue-700); border: 1px solid var(--blue-100); border-radius: 4px; padding: 2px 9px; font-size: .72rem; font-weight: 600; margin-bottom: 8px; }
.detail-title { font-size: .92rem; font-weight: 700; color: var(--gray-900); line-height: 1.4; margin-bottom: 8px; }
.detail-summary { font-size: .8rem; color: var(--gray-700); line-height: 1.65; margin-bottom: 12px; }
.detail-text { font-size: .78rem; color: var(--gray-500); line-height: 1.7; background: var(--gray-50); border: 1px solid var(--gray-100); border-radius: 6px; padding: 10px; max-height: 220px; overflow-y: auto; white-space: pre-wrap; }
.detail-link { display: inline-block; margin-top: 10px; font-size: .78rem; color: var(--blue-700); text-decoration: none; font-weight: 600; }
.detail-link:hover { text-decoration: underline; }

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--gray-300); border-radius: 3px; }

/* ── mobile ── */
@media (max-width: 860px) {
  .topbar .mobile-toggle { display: inline-block; }
  .layout { position: relative; }
  .sidebar, .detail {
    position: fixed; top: 52px; bottom: 0; width: min(85vw, 320px);
    z-index: 45; box-shadow: var(--shadow-lg); transition: transform .22s ease;
  }
  .sidebar { left: 0; transform: translateX(-105%); }
  .sidebar.mobile-open { transform: translateX(0); }
  .detail { right: 0; transform: translateX(105%); }
  .detail.mobile-open { transform: translateX(0); }
  .sidebar-close, .detail-close { display: inline-block; background: none; border: none; font-size: 1.1rem; color: var(--gray-500); cursor: pointer; padding: 4px 8px; }
  .detail-header-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; border-bottom: 1px solid var(--gray-200); }
  .detail-header-row span { font-size: .8rem; font-weight: 700; color: var(--gray-700); }
  .center-header h2 { font-size: .9rem; }
  .tree-controls { gap: 8px; }
}
@media (min-width: 861px) {
  .detail-header-row { display: none; }
}
</style>
</head>
<body>
<header class="topbar">
  <button class="mobile-toggle" id="btn-open-sidebar" onclick="openSidebar()">☰ มาตรา</button>
  <h1>🌳 แผนผังกฎหมายแม่-ลูก</h1>
  <a class="back" href="/">← กลับหน้าค้นหา</a>
</header>

<div class="layout">
  <div class="backdrop" id="backdrop" onclick="closeSidebar(); closeDetail();"></div>

  <!-- Left: section list -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <input id="sec-search" type="text" placeholder="ค้นหามาตรา...">
      <button class="sidebar-close" onclick="closeSidebar()">✕</button>
    </div>
    <div class="section-count" id="sec-count"></div>
    <div class="sec-list" id="sec-list"></div>
  </aside>

  <!-- Center: outline tree -->
  <main class="center">
    <div class="center-header" id="center-header" style="display:none">
      <h2 id="center-title"></h2>
      <p id="center-subtitle"></p>
      <div class="tree-controls">
        <input type="text" id="tree-filter" placeholder="🔎 ค้นหาในแผนผังนี้ (เลขที่/ชื่อฉบับ)...">
        <label><input type="checkbox" id="hide-repealed"> ซ่อนฉบับที่ถูกยกเลิก</label>
      </div>
    </div>
    <div class="empty-state" id="empty-state">
      <div class="icon">⚖️</div>
      <div>เลือกมาตราจากรายการทางซ้ายเพื่อดูแผนผังกฎหมาย</div>
    </div>
    <div class="outline" id="outline" style="display:none"></div>
  </main>

  <!-- Right: detail -->
  <aside class="detail" id="detail">
    <div class="detail-header-row">
      <span>รายละเอียด</span>
      <button class="detail-close" onclick="closeDetail()">✕</button>
    </div>
    <div class="detail-empty" id="detail-empty">
      <div style="font-size:1.5rem">📄</div>
      คลิกรายการในแผนผังเพื่อดูรายละเอียด
    </div>
    <div class="detail-body" id="detail-body" style="display:none"></div>
  </aside>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let allSections = [];
let currentSection = null;
let treeData = null;

// ── Mobile drawer helpers ───────────────────────────────────────────────────
function isMobile() { return window.matchMedia('(max-width: 860px)').matches; }
function openSidebar() {
  document.getElementById('sidebar').classList.add('mobile-open');
  document.getElementById('backdrop').classList.add('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('mobile-open');
  if (!document.getElementById('detail').classList.contains('mobile-open')) {
    document.getElementById('backdrop').classList.remove('show');
  }
}
function openDetail() {
  if (!isMobile()) return;
  document.getElementById('detail').classList.add('mobile-open');
  document.getElementById('backdrop').classList.add('show');
}
function closeDetail() {
  document.getElementById('detail').classList.remove('mobile-open');
  if (!document.getElementById('sidebar').classList.contains('mobile-open')) {
    document.getElementById('backdrop').classList.remove('show');
  }
}

function esc(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ── Load sections list ───────────────────────────────────────────────────────
async function loadSections() {
  const res = await fetch('/api/sections_list');
  allSections = await res.json();
  document.getElementById('sec-count').textContent = `${allSections.length} มาตรา`;
  renderSecListGrouped(allSections);
}

function parseChapter(ch) {
  if (!ch) return { laksana: 'ไม่ระบุ', muat: '' };
  const m = ch.match(/^(ลักษณะ\s+\S+)\s+(หมวด\s+.+)$/);
  if (m) return { laksana: m[1].trim(), muat: m[2].trim() };
  const m2 = ch.match(/^(ลักษณะ\s+\S+)/);
  if (m2) return { laksana: m2[1].trim(), muat: '' };
  return { laksana: ch, muat: '' };
}

const LAKSANA_LABELS = {
  'ลักษณะ 1': 'ลักษณะ 1 ข้อความเบื้องต้น',
  'ลักษณะ 2': 'ลักษณะ 2 ภาษีอากรฝ่ายสรรพากร',
  'ลักษณะ 3': 'ลักษณะ 3 ภาษีบำรุงท้องที่ (ยกเลิก)',
};

function renderSecListGrouped(secs) {
  const list = document.getElementById('sec-list');
  const laksanaOrder = [];
  const byLaksana = {};
  for (const s of secs) {
    const { laksana, muat } = parseChapter(s.chapter);
    const chKey = s.chapter || 'ไม่ระบุ';
    if (!byLaksana[laksana]) { byLaksana[laksana] = []; laksanaOrder.push(laksana); }
    let ch = byLaksana[laksana].find(c => c.chKey === chKey);
    if (!ch) { ch = { chKey, muat, secs: [] }; byLaksana[laksana].push(ch); }
    ch.secs.push(s);
  }

  let html = '';
  for (const laksana of laksanaOrder) {
    const chapters = byLaksana[laksana];
    const label = LAKSANA_LABELS[laksana] || laksana;
    const hasMuat = chapters.some(c => c.muat);
    const lakId = 'ch-' + laksana.replace(/\s+/g,'_').replace(/[^\w_]/g,'') + '_all';

    if (!hasMuat) {
      html += `<div class="laksana-hdr" onclick="toggleChapter('${lakId}')">${esc(label)}</div>`;
    } else {
      html += `<div class="laksana-hdr">${esc(label)}</div>`;
    }

    for (const { chKey, muat, secs: csecs } of chapters) {
      const chId = !hasMuat ? lakId : 'ch-' + chKey.replace(/\s+/g,'_').replace(/[^\w_]/g,'');

      if (muat) {
        html += `<div class="chapter-hdr collapsed" onclick="toggleChapter('${chId}')">
          <span class="ch-arrow">▼</span>
          <span>${esc(muat)}</span>
          <span class="ch-count">${csecs.length}</span>
        </div>`;
      }

      html += `<div class="chapter-body collapsed" id="${chId}">`;
      const partGroups = {}, partOrder = [];
      for (const s of csecs) {
        const pt = s.part || '';
        if (!partGroups[pt]) { partGroups[pt] = []; partOrder.push(pt); }
        partGroups[pt].push(s);
      }
      for (const pt of partOrder) {
        if (pt) html += `<div class="part-hdr">${esc(pt)}</div>`;
        for (const s of partGroups[pt]) {
          html += `<div class="sec-item ${s.id === currentSection ? 'active' : ''}"
            onclick="loadTree('${s.id}')" data-id="${s.id}">
            <div class="sec-ref">${esc(s.ref || s.id)}</div>
            <div class="sec-title">${esc(s.title || '')}</div>
          </div>`;
        }
      }
      html += `</div>`;
    }
  }
  list.innerHTML = html;
}

function toggleChapter(id) {
  const body = document.getElementById(id);
  if (!body) return;
  body.classList.toggle('collapsed');
  const hdr = body.previousElementSibling;
  if (hdr && (hdr.classList.contains('chapter-hdr') || hdr.classList.contains('laksana-hdr'))) {
    hdr.classList.toggle('collapsed');
  }
}

function renderSecList(secs) {
  const list = document.getElementById('sec-list');
  list.innerHTML = secs.map(s => `
    <div class="sec-item ${s.id === currentSection ? 'active' : ''}"
         onclick="loadTree('${s.id}')" data-id="${s.id}">
      <div class="sec-ref">${esc(s.ref || s.id)}</div>
      <div class="sec-title">${esc(s.title || '')}</div>
    </div>
  `).join('');
}

document.getElementById('sec-search').addEventListener('input', e => {
  const q = e.target.value.trim().toLowerCase();
  if (!q) {
    document.getElementById('sec-count').textContent = `${allSections.length} มาตรา`;
    renderSecListGrouped(allSections);
    return;
  }
  const filtered = allSections.filter(s =>
    (s.ref || '').toLowerCase().includes(q) ||
    (s.title || '').toLowerCase().includes(q) ||
    (s.chapter || '').toLowerCase().includes(q)
  );
  document.getElementById('sec-count').textContent = `${filtered.length} มาตรา`;
  renderSecList(filtered);
});

// ── Load tree data for a section ────────────────────────────────────────────
async function loadTree(sectionId) {
  currentSection = sectionId;
  document.querySelectorAll('.sec-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === sectionId);
  });
  const activeEl = document.querySelector(`.sec-item[data-id="${sectionId}"]`);
  if (activeEl) {
    const body = activeEl.closest('.chapter-body');
    if (body && body.classList.contains('collapsed')) toggleChapter(body.id);
    setTimeout(() => activeEl.scrollIntoView({ block: 'nearest', behavior: 'smooth' }), 50);
  }
  if (isMobile()) closeSidebar();

  const outline = document.getElementById('outline');
  outline.style.display = 'block';
  outline.innerHTML = `<div class="outline-empty">กำลังโหลด…</div>`;
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('center-header').style.display = 'block';

  const res = await fetch(`/api/section_tree/${sectionId}`);
  if (!res.ok) {
    outline.innerHTML = `<div class="outline-empty">ไม่พบข้อมูลมาตรานี้</div>`;
    return;
  }
  treeData = await res.json();

  const sec = treeData.section;
  document.getElementById('center-title').textContent = `${sec.ref} — ${sec.title}`;
  const childCount = treeData.children.reduce((a,c) => a + c.docs.length, 0);
  document.getElementById('center-subtitle').textContent =
    `กฎหมายลูก ${childCount} ฉบับ · ฎีกา ${treeData.dika_count} เรื่อง · ข้อหารือ ${treeData.ruling_count} เรื่อง`;

  document.getElementById('tree-filter').value = '';
  renderOutline(treeData);
  showDetailSection(sec);
}

// ── Render outline (collapsible grouped list, replaces D3 force tree) ───────
const DOC_TYPE_COLOR = {
  royal_decree: '#1D4ED8', ministerial_regulation: '#0F766E',
  ministry_notification: '#B45309', ministry_order: '#B45309',
  director_general_notification: '#0369A1', department_order: '#0369A1',
  department_notification: '#0369A1', committee_ruling: '#7E22CE',
  ministry_regulation_order: '#0F766E',
  court_judgment: '#9F1239', ruling: '#64748B',
};

function docItemHtml(d, i, docType) {
  const extraCls = i >= 10 ? ' extra' : '';
  const repCls = d.repealed ? ' is-repealed' : '';
  const tooltip = d.repealed
    ? (d.repealed_by_ref ? `ถูกยกเลิกโดย ${d.repealed_by_ref}` : 'ถูกยกเลิกแล้ว')
    : '';
  const badge = d.repealed
    ? `<span class="badge badge-repealed">ยกเลิก</span>`
    : (d.amended ? `<span class="badge badge-amended">แก้ไขแล้ว</span>` : '');
  return `<div class="doc-item${extraCls}${repCls}" data-id="${esc(d.id)}"
      data-ref="${esc(d.ref || d.id)}" data-title="${esc(d.title || '')}" data-doctype="${esc(docType)}"
      title="${esc(tooltip)}">
    <div class="doc-main"><span class="doc-ref">${esc(d.ref || d.id)}</span>${badge}</div>
    ${d.title ? `<div class="doc-title">${esc(d.title)}</div>` : ''}
    ${d.year ? `<div class="doc-year">พ.ศ. ${esc(d.year)}</div>` : ''}
  </div>`;
}

function groupHtml(grp, idx) {
  const docs = grp.docs;
  const total = docs.length;
  const repealedCount = docs.filter(d => d.repealed).length;
  const collapsedByDefault = total > 10;
  const groupId = 'grp_' + idx;
  const itemsHtml = docs.map((d, i) => docItemHtml(d, i, grp.doc_type)).join('');
  const showAllBtn = total > 10
    ? `<button type="button" class="show-all-btn" data-target="${groupId}">แสดงทั้งหมด (+${total - 10})</button>`
    : '';
  const color = DOC_TYPE_COLOR[grp.doc_type] || '#94A3B8';
  return `<div class="doc-group" data-total="${total}" data-repealed="${repealedCount}" style="border-left-color:${color}">
    <div class="group-hdr${collapsedByDefault ? ' collapsed' : ''}" data-target="${groupId}">
      <span class="grp-arrow">▾</span>
      <span class="grp-icon">${grp.icon}</span>
      <span class="grp-label">${esc(grp.label)}</span>
      <span class="grp-count">${total}</span>
    </div>
    <div class="group-body${collapsedByDefault ? ' collapsed' : ''}" id="${groupId}">
      ${itemsHtml}
      ${showAllBtn}
    </div>
  </div>`;
}

function renderOutline(data) {
  const outline = document.getElementById('outline');
  const groupsAll = [];
  data.children.forEach(grp => { if (grp.docs.length) groupsAll.push(grp); });
  if (data.dika_count) {
    groupsAll.push({ doc_type: 'court_judgment', icon: '⚖️', label: 'คำพิพากษาฎีกา', docs: data.dika });
  }
  if (data.ruling_count) {
    groupsAll.push({ doc_type: 'ruling', icon: '💬', label: 'ข้อหารือ', docs: data.rulings });
  }

  if (!groupsAll.length) {
    outline.innerHTML = `<div class="outline-empty">ไม่พบกฎหมายลูก / ฎีกา / ข้อหารือ ที่เชื่อมโยงกับมาตรานี้ในคลัง</div>`;
    return;
  }

  outline.classList.remove('filtering', 'hide-repealed');
  document.getElementById('hide-repealed').checked = false;

  let html = `<div class="outline-no-match" id="outline-no-match">ไม่พบรายการที่ตรงกับคำค้นหา</div>`;
  groupsAll.forEach((grp, idx) => { html += groupHtml(grp, idx); });
  outline.innerHTML = html;
}

// ── Outline interactions: expand/collapse, show-all, filter, hide-repealed ──
document.getElementById('outline').addEventListener('click', e => {
  const hdr = e.target.closest('.group-hdr');
  if (hdr) {
    hdr.classList.toggle('collapsed');
    const body = document.getElementById(hdr.dataset.target);
    if (body) body.classList.toggle('collapsed');
    return;
  }
  const btn = e.target.closest('.show-all-btn');
  if (btn) {
    const body = document.getElementById(btn.dataset.target);
    if (body) {
      const showing = body.classList.toggle('show-all');
      const total = body.parentElement.dataset.total;
      btn.textContent = showing ? 'ย่อรายการ' : `แสดงทั้งหมด (+${total - 10})`;
    }
    return;
  }
  const item = e.target.closest('.doc-item');
  if (item) {
    showDetailNode({
      id: item.dataset.id,
      name: item.dataset.ref,
      label: item.dataset.title,
      doc_type: item.dataset.doctype,
      repealed: item.classList.contains('is-repealed'),
    });
    if (isMobile()) openDetail();
  }
});

document.getElementById('hide-repealed').addEventListener('change', e => {
  document.getElementById('outline').classList.toggle('hide-repealed', e.target.checked);
  recalcGroupCounts(e.target.checked);
});

function recalcGroupCounts(hiding) {
  document.querySelectorAll('.doc-group').forEach(g => {
    const total = parseInt(g.dataset.total, 10) || 0;
    const repealedCount = parseInt(g.dataset.repealed, 10) || 0;
    const countEl = g.querySelector('.grp-count');
    if (hiding && repealedCount > 0) countEl.textContent = `${total - repealedCount}/${total}`;
    else countEl.textContent = total;
  });
}

let _filterTimer = null;
document.getElementById('tree-filter').addEventListener('input', e => {
  clearTimeout(_filterTimer);
  _filterTimer = setTimeout(() => applyFilter(e.target.value), 100);
});

function applyFilter(raw) {
  const q = (raw || '').trim().toLowerCase();
  const outline = document.getElementById('outline');
  outline.classList.toggle('filtering', !!q);
  let anyVisible = false;
  document.querySelectorAll('.doc-group').forEach(g => {
    let groupHasMatch = !q;
    g.querySelectorAll('.doc-item').forEach(item => {
      if (!q) { item.style.display = ''; return; }
      const hay = (item.dataset.ref + ' ' + item.dataset.title).toLowerCase();
      const match = hay.includes(q);
      item.style.display = match ? '' : 'none';
      if (match) groupHasMatch = true;
    });
    g.style.display = groupHasMatch ? '' : 'none';
    if (groupHasMatch) anyVisible = true;
  });
  const noMatch = document.getElementById('outline-no-match');
  if (noMatch) noMatch.style.display = (q && !anyVisible) ? 'block' : 'none';
}

// ── Detail panel ─────────────────────────────────────────────────────────────
function showDetailSection(sec) {
  document.getElementById('detail-empty').style.display = 'none';
  const body = document.getElementById('detail-body');
  body.style.display = 'block';
  body.innerHTML = `
    <div class="detail-tag">มาตราประมวลรัษฎากร</div>
    <div class="detail-title">${esc(sec.ref)} — ${esc(sec.title)}</div>
    <div class="detail-summary">${esc(sec.summary || '')}</div>
    ${sec.text ? `<div class="detail-text">${esc(sec.text)}</div>` : ''}
    ${sec.source_url ? `<a class="detail-link" href="${sec.source_url}" target="_blank">ดูต้นฉบับ rd.go.th →</a>` : ''}
    <a class="detail-link" style="margin-left:${sec.source_url ? '12px' : '0'}" href="/?section_ref=${encodeURIComponent(sec.ref)}" target="_blank">ค้นหาในแอปหลัก →</a>
  `;
}

async function showDetailNode(d) {
  document.getElementById('detail-empty').style.display = 'none';
  const body = document.getElementById('detail-body');
  body.style.display = 'block';
  body.innerHTML = `<div style="color:var(--gray-400);font-size:.8rem">กำลังโหลด...</div>`;

  try {
    const res = await fetch(`/api/detail/${d.id}`);
    if (!res.ok) throw new Error('not found');
    const doc = await res.json();

    const TYPE_LABELS = {
      royal_decree: 'พระราชกฤษฎีกา', ministerial_regulation: 'กฎกระทรวง',
      director_general_notification: 'ประกาศอธิบดีกรมสรรพากร',
      department_order: 'คำสั่งกรมสรรพากร', department_notification: 'ประกาศกรมสรรพากร',
      ministry_notification: 'ประกาศกระทรวงการคลัง', ministry_order: 'คำสั่งกระทรวงการคลัง',
      court_judgment: 'คำพิพากษาฎีกา', ruling: 'ข้อหารือ',
      committee_ruling: 'คำวินิจฉัยคณะกรรมการ',
    };
    const label = TYPE_LABELS[doc.type] || doc.type || '';
    const summary = doc.plain_summary || doc.summary || '';
    const repBadge = d.repealed ? '<span style="color:var(--red-700);font-size:.72rem"> [ยกเลิกแล้ว]</span>' : '';

    body.innerHTML = `
      <div class="detail-tag">${esc(label)}</div>
      <div class="detail-title">${esc(doc.ref_number || doc.id)}${repBadge}</div>
      <div class="detail-title" style="font-size:.8rem;font-weight:400;color:var(--gray-500);margin-top:4px">${esc(doc.title || '')}</div>
      <div class="detail-summary" style="margin-top:10px">${esc(summary)}</div>
      ${doc.why_issued ? `<div style="margin-top:8px"><b style="font-size:.75rem;color:var(--blue-700)">เหตุผล:</b><div class="detail-summary" style="margin-top:3px">${esc(doc.why_issued)}</div></div>` : ''}
      ${doc.law_chain_summary ? `<div style="margin-top:8px"><b style="font-size:.75rem;color:var(--blue-700)">สายกฎหมาย:</b><div class="detail-summary" style="margin-top:3px">${esc(doc.law_chain_summary)}</div></div>` : ''}
      <a class="detail-link" href="${doc.source_url || '#'}" target="_blank">ดูต้นฉบับ →</a>
      <button class="detail-link" style="border:none;cursor:pointer;background:none;padding:0;margin-left:12px;font-family:inherit"
        onclick="openInMainApp('${d.id}')">เปิดในแอปหลัก →</button>
    `;
  } catch {
    body.innerHTML = `
      <div class="detail-tag">${esc(d.doc_type || '')}</div>
      <div class="detail-title">${esc(d.name)}</div>
      <div class="detail-summary">${esc(d.label || '')}</div>
      <a class="detail-link" href="/?q=${encodeURIComponent(d.name)}" target="_blank">ค้นหาในแอปหลัก →</a>
    `;
  }
}

// ── Main app integration ──────────────────────────────────────────────────────
let _mainAppWindow = null;

function openInMainApp(docId) {
  const url = `/?doc=${encodeURIComponent(docId)}`;
  if (_mainAppWindow && !_mainAppWindow.closed) {
    try {
      _mainAppWindow.focus();
      _mainAppWindow.openDetail(docId, null);
      return;
    } catch(e) {}
  }
  _mainAppWindow = window.open(url, 'mainApp');
}

window.addEventListener('message', e => {
  if (e.origin !== location.origin) return;
  if (e.data?.type === 'VIEW_SECTION' && e.data.sectionId) {
    loadTree(e.data.sectionId);
  }
});

// ── Init ──────────────────────────────────────────────────────────────────────
loadSections();

const hash = location.hash.replace('#', '');
if (hash) { setTimeout(() => loadTree(hash), 400); }
</script>
